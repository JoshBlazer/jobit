global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: Sluice-api
    static_configs:
      - targets: ["host.docker.internal:8080"]
    metrics_path: /metrics

  - job_name: Sluice-scheduler
    static_configs:
      - targets: ["host.docker.internal:9091"]
    metrics_path: /metrics

  - job_name: Sluice-worker
    static_configs:
      - targets: ["host.docker.internal:9092"]
    metrics_path: /metrics
