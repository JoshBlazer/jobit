apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "Sluice.fullname" . }}-scheduler
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "Sluice.labels" . | nindent 4 }}
    app.kubernetes.io/component: scheduler
spec:
  replicas: {{ .Values.scheduler.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: scheduler
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: scheduler
    spec:
      containers:
        - name: scheduler
          image: {{ include "Sluice.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["--role", "scheduler"]
          {{- include "Sluice.envFrom" . | nindent 10 }}
          resources:
            {{- toYaml .Values.scheduler.resources | nindent 12 }}
