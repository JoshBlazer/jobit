apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "Sluice.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "Sluice.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: {{ include "Sluice.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["--role", "api"]
          ports:
            - containerPort: {{ .Values.api.port }}
          {{- include "Sluice.envFrom" . | nindent 10 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "Sluice.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "Sluice.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
  ports:
    - port: 80
      targetPort: {{ .Values.api.port }}
  type: ClusterIP
