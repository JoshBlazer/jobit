apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "Sluice.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "Sluice.labels" . | nindent 4 }}
data:
  Sluice_POSTGRES_URL: {{ .Values.postgres.url | quote }}
  Sluice_REDIS_ADDR: {{ .Values.redis.addr | quote }}
  Sluice_ETCD_ENDPOINTS: {{ .Values.etcd.endpoints | quote }}
  Sluice_PORT: {{ .Values.api.port | quote }}
