apiVersion: apps/v1
kind: Deployment
metadata:
  name: Sluice-api
  namespace: Sluice
  labels:
    app: Sluice-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: Sluice-api
  template:
    metadata:
      labels:
        app: Sluice-api
    spec:
      containers:
        - name: api
          image: Sluice:latest
          args: ["--role", "api"]
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: Sluice-config
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: Sluice-api
  namespace: Sluice
spec:
  selector:
    app: Sluice-api
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
