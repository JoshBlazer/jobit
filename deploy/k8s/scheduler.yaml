# Scheduler runs with 3 replicas. Only the instance that wins the etcd
# election is active; the other two are hot standbys.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: Sluice-scheduler
  namespace: Sluice
  labels:
    app: Sluice-scheduler
spec:
  replicas: 3
  selector:
    matchLabels:
      app: Sluice-scheduler
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: Sluice-scheduler
    spec:
      containers:
        - name: scheduler
          image: Sluice:latest
          args: ["--role", "scheduler"]
          envFrom:
            - configMapRef:
                name: Sluice-config
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
